<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Grand Archive: Sovereign Final</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #c0392b; --bg-edit: #f4f7f6;
            --bg-book: #0a0a0a; --paper: #fdfcf0; --gold: #d4af37;
        }
        body { font-family: "Yu Mincho", serif; margin: 0; background: var(--bg-edit); transition: 0.5s; }
        header { background: var(--primary); color: white; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.4); }
        #archiveTitleDisplay { font-size: 1.4rem; font-weight: bold; cursor: pointer; border-bottom: 2px solid var(--gold); }
        .editor-grid { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 350px 1fr; gap: 30px; padding: 0 20px; }
        .sidebar { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: sticky; top: 80px; height: fit-content; }
        .main-editor { background: white; border-radius: 15px; padding: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; }
        .paint-container { background: #222; padding: 25px; border-radius: 20px; display: flex; gap: 20px; }
        #paintCanvas { background: white; border: 4px solid #000; cursor: crosshair; }
        .paint-sidebar { display: flex; flex-direction: column; gap: 10px; width: 150px; color: white; }
        .image-slot { border: 1px dashed #ccc; padding: 15px; margin-bottom: 15px; border-radius: 10px; background: #fafafa; }
        .preview-img { max-width: 150px; display: none; border: 2px solid #333; margin: 10px 0; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .char-entry { padding: 10px; background: #f9f9f9; margin-bottom: 5px; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #ddd; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .deco-panel { background: #eee; padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 0.9rem; }
        #sectionBook { display: none; height: calc(100vh - 70px); position: relative; overflow: hidden; justify-content: center; align-items: center; }
        .book-wrapper { position: relative; width: 90%; max-width: 1000px; height: 85vh; perspective: 2000px; }
        .page-node { position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: var(--paper); border-radius: 0 15px 15px 0; box-shadow: 0 10px 50px rgba(0,0,0,0.5); display: none; padding: 50px; box-sizing: border-box; overflow-y: auto; border-left: 15px solid rgba(0,0,0,0.2); animation: flipIn 0.6s ease-out forwards; }
        .page-node.active { display: block; }
        @keyframes flipIn { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0deg); opacity: 1; } }
        .nav-btn { position: absolute; bottom: 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 10px 20px; cursor: pointer; z-index: 100; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div id="archiveTitleDisplay" onclick="changeTitlePrompt()">至高のアーカイブ</div>
    <div class="mode-switch">
        <button class="btn-action" style="width:100px; margin:0;" onclick="setMode('edit')">書斎</button>
        <button class="btn-action" style="width:100px; margin:0; background:var(--accent);" onclick="setMode('book')">図鑑</button>
    </div>
</header>

<div id="sectionEdit" class="editor-grid">
    <div class="sidebar">
        <button class="btn-action" style="background:#3498db" onclick="initNew()">＋ 新規英雄</button>
        <div id="charList" style="max-height:200px; overflow-y:auto; margin-bottom:10px;"></div>
        <div class="deco-panel">
            <h4 style="margin:0 0 10px 0;">🎨 表紙のでこ</h4>
            背景: <input type="color" id="decoBg" value="#4a1c1c" onchange="saveDeco()">
            文字: <input type="color" id="decoText" value="#d4af37" onchange="saveDeco()">
            紋章: <select id="decoEmblem" onchange="saveDeco()">
                <option value="📖">本</option><option value="⚔️">剣</option><option value="🐉">龍</option><option value="✨">星</option><option value="👑">王</option>
            </select>
        </div>
        <div class="deco-panel" style="background:#e8f4fd;">
            <h4 style="margin:0 0 10px 0;">🔗 共有</h4>
            <button onclick="exportData()">コード生成</button>
            <textarea id="shareCode" style="height:50px; font-size:0.7rem; margin-top:5px;"></textarea>
            <button onclick="importData()" style="background:#2ecc71; color:white; border:none; width:100%;">読込</button>
        </div>
    </div>

    <div class="main-editor">
        <input type="hidden" id="editIdx" value="-1">
        <label>英雄の名</label><input type="text" id="inpName">
        <label>肖像画（最大2枚）</label>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="image-slot"><button onclick="openPaintModal(0)">🖌 1枚目を描く</button><img id="prev0" class="preview-img"><input type="hidden" id="dataImg0"><textarea id="dataDesc0" rows="2" placeholder="1枚目の解説"></textarea></div>
            <div class="image-slot"><button onclick="openPaintModal(1)">🖌 2枚目を描く</button><img id="prev1" class="preview-img"><input type="hidden" id="dataImg1"><textarea id="dataDesc1" rows="2" placeholder="2枚目の解説"></textarea></div>
        </div>
        <label>ステータス項目</label><div id="fieldContainer"></div><button onclick="newField()">＋ 項目追加</button>
        <label style="margin-top:20px; display:block;">図鑑解説（要約・能力）</label><textarea id="inpDesc" rows="4" placeholder="図鑑に直接表示される解説文..."></textarea>
        <label>英雄譚（深掘りする物語）</label><textarea id="inpMythos" rows="6" placeholder="右下のボタンから読める長い物語..."></textarea>
        <button class="btn-action" style="background:var(--accent); font-size:1.2rem; margin-top:20px;" onclick="save()">アーカイブを保存</button>
    </div>
</div>

<div id="paintModal" class="modal">
    <div class="paint-container">
        <canvas id="paintCanvas" width="600" height="600"></canvas>
        <div class="paint-sidebar">
            <input type="color" id="pCol" value="#000000" style="height:50px;">
            <input type="range" id="pSize" min="1" max="50" value="5">
            <button class="btn-action" onclick="currentTool='brush'">ペン</button>
            <button class="btn-action" onclick="currentTool='fill'">塗りつぶし</button>
            <button class="btn-action" onclick="currentTool='eraser'">消しゴム</button>
            <button class="btn-action" style="background:#555;" onclick="undo()">↩ 戻る</button>
            <button class="btn-action" style="background:#e74c3c;" onclick="clearCanvas()">クリア</button>
            <button class="btn-action" style="background:#2ecc71;" onclick="saveCanvas()">決定</button>
            <button class="btn-action" onclick="closePaintModal()">閉じる</button>
        </div>
    </div>
</div>

<div id="sectionBook">
    <div class="book-wrapper" id="bookWrapper"></div>
    <button class="nav-btn" style="left:40px;" onclick="prevPage()">◀ 前頁</button>
    <button class="nav-btn" style="right:40px;" onclick="nextPage()">次頁 ▶</button>
</div>

<script>
    let chars = JSON.parse(localStorage.getItem('zukan_final_v12')) || [];
    let archiveTitle = localStorage.getItem('title_v12') || "至高のアーカイブ";
    let deco = JSON.parse(localStorage.getItem('deco_v12')) || {bg:'#4a1c1c', text:'#d4af37', emblem:'📖'};
    let activeSlot = 0; let currentPageIdx = 0; let history = [];
    const canvas = document.getElementById('paintCanvas'); const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let drawing = false; let currentTool = 'brush';

    function initCanvas() {
        ctx.fillStyle = "white"; ctx.fillRect(0,0,600,600); saveHistory();
        canvas.onmousedown = (e) => { if(currentTool==='fill') execFill(e); else { drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x, p.y); } };
        canvas.onmousemove = (e) => { if(!drawing || currentTool==='fill') return; const p=getPos(e); ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=document.getElementById('pSize').value; ctx.strokeStyle=(currentTool==='eraser'?'white':document.getElementById('pCol').value); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        window.onmouseup = () => { if(drawing){ drawing=false; saveHistory(); } };
    }
    function getPos(e) { const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
    function saveHistory() { if(history.length>15) history.shift(); history.push(ctx.getImageData(0,0,600,600)); }
    function undo() { if(history.length>1){ history.pop(); ctx.putImageData(history[history.length-1], 0,0); } }
    function execFill(e) {
        const p=getPos(e); const x=Math.floor(p.x), y=Math.floor(p.y); const target=ctx.getImageData(x,y,1,1).data; const fill=hexToRgb(document.getElementById('pCol').value);
        if(Math.abs(target[0]-fill[0])<5 && Math.abs(target[1]-fill[1])<5 && Math.abs(target[2]-fill[2])<5) return;
        const imgData = ctx.getImageData(0,0,600,600); const data = imgData.data; const stack = [[x, y]];
        while(stack.length){
            const [cx, cy] = stack.pop(); const off = (cy*600+cx)*4;
            if(Math.abs(data[off]-target[0])<5 && Math.abs(data[off+1]-target[1])<5 && Math.abs(data[off+2]-target[2])<5){
                data[off]=fill[0]; data[off+1]=fill[1]; data[off+2]=fill[2]; data[off+3]=255;
                if(cx>0) stack.push([cx-1, cy]); if(cx<599) stack.push([cx+1, cy]); if(cy>0) stack.push([cx, cy-1]); if(cy<599) stack.push([cx, cy+1]);
            }
        }
        ctx.putImageData(imgData, 0, 0); saveHistory();
    }
    function hexToRgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

    function save() {
        const name = document.getElementById('inpName').value; if(!name) return;
        const fields = Array.from(document.querySelectorAll('.f-row')).map(r => ({l:r.querySelector('.f-l').value, v:r.querySelector('.f-v').value}));
        const data = { name, fields, desc: document.getElementById('inpDesc').value, mythos: document.getElementById('inpMythos').value, imgs: [{img:document.getElementById('dataImg0').value, desc:document.getElementById('dataDesc0').value}, {img:document.getElementById('dataImg1').value, desc:document.getElementById('dataDesc1').value}] };
        const idx = parseInt(document.getElementById('editIdx').value);
        if(idx===-1) chars.push(data); else chars[idx]=data;
        localStorage.setItem('zukan_final_v12', JSON.stringify(chars)); renderList(); initNew(); alert("保存完了");
    }
    function renderList() { document.getElementById('charList').innerHTML = chars.map((c,i)=>`<div class="char-entry" onclick="edit(${i})"><span>${c.name}</span><span style="color:red;" onclick="event.stopPropagation(); deleteChar(${i})">✕</span></div>`).join(''); }
    function deleteChar(i){ if(confirm("消去？")){ chars.splice(i,1); localStorage.setItem('zukan_final_v12', JSON.stringify(chars)); renderList(); } }
    function edit(i) {
        const c=chars[i]; document.getElementById('editIdx').value=i; document.getElementById('inpName').value=c.name; document.getElementById('inpDesc').value=c.desc||''; document.getElementById('inpMythos').value=c.mythos||'';
        document.getElementById('fieldContainer').innerHTML=''; (c.fields||[]).forEach(f=>newField(f.l, f.v));
        c.imgs.forEach((m,s)=>{ document.getElementById('dataImg'+s).value=m.img; document.getElementById('prev'+s).src=m.img; document.getElementById('prev'+s).style.display=m.img?'block':'none'; document.getElementById('dataDesc'+s).value=m.desc; });
    }
    function initNew() { document.getElementById('editIdx').value="-1"; document.getElementById('inpName').value=""; document.getElementById('inpDesc').value=""; document.getElementById('inpMythos').value=""; document.getElementById('fieldContainer').innerHTML=''; newField(); [0,1].forEach(s=>{ document.getElementById('dataImg'+s).value=""; document.getElementById('prev'+s).style.display='none'; document.getElementById('dataDesc'+s).value=""; }); }
    function newField(l='', v=''){ const d=document.createElement('div'); d.className='f-row'; d.style="display:flex; gap:5px; margin-bottom:5px;"; d.innerHTML=`<input type="text" class="f-l" value="${l}" placeholder="項目" style="flex:1; margin:0;"><input type="text" class="f-v" value="${v}" placeholder="内容" style="flex:2; margin:0;">`; document.getElementById('fieldContainer').appendChild(d); }
    function saveDeco(){ deco={bg:document.getElementById('decoBg').value, text:document.getElementById('decoText').value, emblem:document.getElementById('decoEmblem').value}; localStorage.setItem('deco_v12', JSON.stringify(deco)); }
    function exportData(){ const f={title:archiveTitle, chars, deco}; document.getElementById('shareCode').value=btoa(unescape(encodeURIComponent(JSON.stringify(f)))); alert("生成成功"); }
    function importData(){ try { const d=JSON.parse(decodeURIComponent(escape(atob(document.getElementById('shareCode').value)))); archiveTitle=d.title; chars=d.chars; deco=d.deco; location.reload(); } catch(e){ alert("失敗"); } }
    function setMode(m){ document.getElementById('sectionEdit').style.display=m==='edit'?'grid':'none'; document.getElementById('sectionBook').style.display=m==='book'?'flex':'none'; document.body.style.background=m==='edit'?'var(--bg-edit)':'var(--bg-book)'; if(m==='book') buildBook(); }
    function buildBook(){
        const w=document.getElementById('bookWrapper');
        let h=`<div class="page-node cover-node active" id="p-0" style="background:${deco.bg}; color:${deco.text};"><div style="font-size:8rem;">${deco.emblem}</div><h1>${archiveTitle}</h1></div>`;
        chars.forEach((c,i)=>{
            h+=`<div class="page-node" id="p-${i+1}"><h2 style="text-align:center; border-bottom:2px solid var(--gold);">${c.name}</h2>
            <div style="display:flex; gap:10px;">${c.imgs.map(m=>m.img?`<div style="flex:1;"><img src="${m.img}" style="width:100%; border:2px solid #333;"><p style="font-size:0.8rem;">${m.desc}</p></div>`:'').join('')}</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin:15px 0; font-size:0.9rem;">${(c.fields||[]).map(f=>`<div><b>${f.l}</b>: ${f.v}</div>`).join('')}</div>
            <div style="background:rgba(0,0,0,0.03); padding:15px; border-radius:5px; margin-bottom:15px;">${c.desc||''}</div>
            ${c.mythos ? `<button onclick="alert('【英雄譚】\\n\\n' + chars[${i}].mythos)" style="padding:10px; cursor:pointer; background:var(--gold); border:none; border-radius:5px;">📜 英雄譚を開く</button>` : ''}
            </div>`;
        });
        w.innerHTML=h; currentPageIdx=0;
    }
    function nextPage(){ if(currentPageIdx<chars.length){ document.getElementById(`p-${currentPageIdx}`).classList.remove('active'); currentPageIdx++; document.getElementById(`p-${currentPageIdx}`).classList.add('active'); } }
    function prevPage(){ if(currentPageIdx>0){ document.getElementById(`p-${currentPageIdx}`).classList.remove('active'); currentPageIdx--; document.getElementById(`p-${currentPageIdx}`).classList.add('active'); } }
    function changeTitlePrompt(){ const t=prompt("題名:", archiveTitle); if(t){ archiveTitle=t; localStorage.setItem('title_v12', t); document.getElementById('archiveTitleDisplay').innerText=t; } }
    function openPaintModal(s){ activeSlot=s; document.getElementById('paintModal').style.display='flex'; history=[]; initCanvas(); }
    function closePaintModal(){ document.getElementById('paintModal').style.display='none'; }
    function clearCanvas(){ ctx.fillStyle="white"; ctx.fillRect(0,0,600,600); saveHistory(); }
    function saveCanvas(){ const d=canvas.toDataURL(); document.getElementById('dataImg'+activeSlot).value=d; document.getElementById('prev'+activeSlot).src=d; document.getElementById('prev'+activeSlot).style.display='block'; closePaintModal(); }
    window.onload=()=>{ document.getElementById('archiveTitleDisplay').innerText=archiveTitle; document.getElementById('decoBg').value=deco.bg; document.getElementById('decoText').value=deco.text; document.getElementById('decoEmblem').value=deco.emblem; renderList(); initNew(); };
</script>
</body>
</html>
