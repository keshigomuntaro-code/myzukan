<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grand Archive: Sovereign Mobile</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #c0392b; --bg-edit: #f4f7f6;
            --bg-book: #0a0a0a; --paper: #fdfcf0; --gold: #d4af37;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: "Yu Mincho", serif; margin: 0; background: var(--bg-edit); overflow-x: hidden; touch-action: manipulation; }
        
        /* スマホ向けヘッダー */
        header { 
            background: var(--primary); color: white; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; height: 60px;
        }
        #archiveTitleDisplay { font-size: 1.1rem; font-weight: bold; border-bottom: 2px solid var(--gold); max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* レスポンシブ・グリッド */
        .editor-grid { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding: 15px; }
        .sidebar { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); order: 2; }
        .main-editor { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); order: 1; }

        /* ペイントモーダル（スマホ全画面対応） */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; flex-direction: column; }
        .paint-container { width: 100%; height: 100%; display: flex; flex-direction: column; }
        #paintCanvas { background: white; width: 100vw; height: 100vw; max-width: 600px; max-height: 600px; margin: auto; touch-action: none; border-bottom: 2px solid #333; }
        .paint-sidebar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 15px; background: #222; }

        /* UIパーツ */
        .image-slot { border: 1px dashed #ccc; padding: 10px; margin-bottom: 10px; border-radius: 10px; text-align: center; }
        .preview-img { max-width: 100%; max-height: 120px; display: none; border: 2px solid #333; margin: 10px auto; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
        .char-entry { padding: 12px; background: #f9f9f9; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; border: 1px solid #ddd; align-items: center; }
        
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 16px; /* 防止ズーム */ }
        .deco-panel { background: #eee; padding: 12px; border-radius: 10px; margin-top: 15px; }

        /* 図鑑モード（スマホ最適化） */
        #sectionBook { display: none; width: 100vw; height: calc(100vh - 60px); background: var(--bg-book); overflow: hidden; position: relative; }
        .book-wrapper { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        .page-node { 
            position: absolute; width: 90%; height: 85%; background: var(--paper); border-radius: 10px;
            padding: 20px; overflow-y: auto; display: none; box-shadow: 0 5px 25px rgba(0,0,0,0.8);
            transform-origin: center; animation: slideIn 0.3s ease-out;
        }
        .page-node.active { display: block; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .nav-btn { position: absolute; bottom: 20px; background: var(--gold); color: black; border: none; padding: 12px 20px; font-weight: bold; border-radius: 30px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        @media (min-width: 768px) {
            .editor-grid { flex-direction: row; }
            .sidebar { width: 350px; order: 1; }
            .main-editor { flex: 1; order: 2; }
            #paintCanvas { width: 600px; height: 600px; }
        }
    </style>
</head>
<body>

<header>
    <div id="archiveTitleDisplay" onclick="changeTitlePrompt()">至高のアーカイブ</div>
    <div style="display:flex; gap:5px;">
        <button class="btn-action" style="width:70px; margin:0; font-size:0.8rem;" onclick="setMode('edit')">編纂</button>
        <button class="btn-action" style="width:70px; margin:0; font-size:0.8rem; background:var(--accent);" onclick="setMode('book')">図鑑</button>
    </div>
</header>

<div id="sectionEdit" class="editor-grid">
    <div class="main-editor">
        <input type="hidden" id="editIdx" value="-1">
        <label>英雄の名</label><input type="text" id="inpName">
        
        <label>肖像画 (スマホはタップして描く)</label>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="image-slot" onclick="openPaintModal(0)"><div id="slotLabel0">🖌 描く</div><img id="prev0" class="preview-img"><input type="hidden" id="dataImg0"><textarea id="dataDesc0" rows="2" placeholder="解説" onclick="event.stopPropagation()"></textarea></div>
            <div class="image-slot" onclick="openPaintModal(1)"><div id="slotLabel1">🖌 描く</div><img id="prev1" class="preview-img"><input type="hidden" id="dataImg1"><textarea id="dataDesc1" rows="2" placeholder="解説" onclick="event.stopPropagation()"></textarea></div>
        </div>

        <label>ステータス項目</label>
        <div id="fieldContainer"></div>
        <button class="btn-action" style="background:#888;" onclick="newField()">＋ 項目追加</button>

        <label>図鑑解説（要約）</label>
        <textarea id="inpDesc" rows="3" placeholder="能力や特徴のまとめ..."></textarea>
        
        <label>英雄譚（物語）</label>
        <textarea id="inpMythos" rows="5" placeholder="詳細なエピソード..."></textarea>
        
        <button class="btn-action" style="background:var(--accent); font-size:1.1rem; padding:15px;" onclick="save()">アーカイブを保存</button>
    </div>

    <div class="sidebar">
        <button class="btn-action" style="background:#3498db" onclick="initNew()">＋ 新規英雄</button>
        <div id="charList" style="max-height:250px; overflow-y:auto; border:1px solid #eee; padding:5px; border-radius:10px;"></div>
        
        <div class="deco-panel">
            <h4 style="margin:0 0 10px 0;">🎨 表紙デコ</h4>
            <div style="display:flex; gap:10px;">
                <input type="color" id="decoBg" value="#4a1c1c" onchange="saveDeco()">
                <input type="color" id="decoText" value="#d4af37" onchange="saveDeco()">
                <select id="decoEmblem" onchange="saveDeco()" style="margin:0;">
                    <option value="📖">本</option><option value="⚔️">剣</option><option value="🐉">龍</option><option value="✨">星</option><option value="👑">王</option>
                </select>
            </div>
        </div>

        <div class="deco-panel" style="background:#e8f4fd;">
            <h4 style="margin:0 0 10px 0;">🔗 共有</h4>
            <button class="btn-action" style="background:#3498db; margin-bottom:5px;" onclick="exportData()">コードをコピー</button>
            <textarea id="shareCode" style="height:60px; font-size:0.6rem;" placeholder="コードを貼って読込"></textarea>
            <button class="btn-action" style="background:#2ecc71; margin:0;" onclick="importData()">読込</button>
        </div>
    </div>
</div>

<div id="paintModal" class="modal">
    <div class="paint-container">
        <canvas id="paintCanvas" width="600" height="600"></canvas>
        <div class="paint-sidebar">
            <input type="color" id="pCol" value="#000000" style="width:100%; height:45px; padding:0;">
            <button class="btn-action" style="margin:0; background:#444;" onclick="currentTool='brush'">ペン</button>
            <button class="btn-action" style="margin:0; background:#444;" onclick="currentTool='fill'">塗</button>
            <button class="btn-action" style="margin:0; background:#444;" onclick="undo()">↩</button>
            <button class="btn-action" style="margin:0; background:#e74c3c; grid-column: span 1;" onclick="clearCanvas()">清</button>
            <button class="btn-action" style="margin:0; background:#555;" onclick="currentTool='eraser'">消</button>
            <button class="btn-action" style="margin:0; background:#2ecc71; grid-column: span 2;" onclick="saveCanvas()">決定</button>
        </div>
        <button class="btn-action" style="border-radius:0; height:60px; margin:0; background:#000;" onclick="closePaintModal()">✕ キャンセルして閉じる</button>
    </div>
</div>

<div id="sectionBook">
    <div class="book-wrapper" id="bookWrapper"></div>
    <button class="nav-btn" style="left:15px;" onclick="prevPage()">◀</button>
    <button class="nav-btn" style="right:15px;" onclick="nextPage()">▶</button>
</div>

<script>
    let chars = JSON.parse(localStorage.getItem('zukan_v14_data')) || [];
    let archiveTitle = localStorage.getItem('zukan_v14_title') || "至高のアーカイブ";
    let deco = JSON.parse(localStorage.getItem('zukan_v14_deco')) || {bg:'#4a1c1c', text:'#d4af37', emblem:'📖'};
    let activeSlot = 0; let currentPageIdx = 0; let history = [];
    const canvas = document.getElementById('paintCanvas'); const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let drawing = false; let currentTool = 'brush';

    // --- スマホ・PC両対応描画 ---
    function initCanvas() {
        ctx.fillStyle = "white"; ctx.fillRect(0,0,600,600); saveHistory();
        
        const startEvent = (e) => {
            e.preventDefault();
            const p = getPos(e.touches ? e.touches[0] : e);
            if(currentTool === 'fill') { execFill(p.x, p.y); }
            else { drawing = true; ctx.beginPath(); ctx.moveTo(p.x, p.y); }
        };
        const moveEvent = (e) => {
            if(!drawing || currentTool === 'fill') return;
            e.preventDefault();
            const p = getPos(e.touches ? e.touches[0] : e);
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.lineWidth = 8; // スマホ用に少し太め
            ctx.strokeStyle = (currentTool === 'eraser' ? 'white' : document.getElementById('pCol').value);
            ctx.lineTo(p.x, p.y); ctx.stroke();
        };
        const endEvent = () => { if(drawing){ drawing=false; saveHistory(); } };

        canvas.ontouchstart = startEvent; canvas.ontouchmove = moveEvent; canvas.ontouchend = endEvent;
        canvas.onmousedown = startEvent; canvas.onmousemove = moveEvent; canvas.onmouseup = endEvent;
    }
    function getPos(e) { 
        const r = canvas.getBoundingClientRect(); 
        const scaleX = canvas.width / r.width;
        const scaleY = canvas.height / r.height;
        return { x: (e.clientX - r.left) * scaleX, y: (e.clientY - r.top) * scaleY }; 
    }
    function saveHistory() { if(history.length > 10) history.shift(); history.push(ctx.getImageData(0,0,600,600)); }
    function undo() { if(history.length > 1){ history.pop(); ctx.putImageData(history[history.length-1], 0,0); } }
    
    function execFill(startX, startY) {
        const x = Math.floor(startX); const y = Math.floor(startY);
        const target = ctx.getImageData(x,y,1,1).data;
        const fill = hexToRgb(document.getElementById('pCol').value);
        if(Math.abs(target[0]-fill[0])<5 && Math.abs(target[1]-fill[1])<5 && Math.abs(target[2]-fill[2])<5) return;
        const imgData = ctx.getImageData(0,0,600,600); const data = imgData.data; const stack = [[x, y]];
        while(stack.length){
            const [cx, cy] = stack.pop(); const off = (cy*600+cx)*4;
            if(Math.abs(data[off]-target[0])<10 && Math.abs(data[off+1]-target[1])<10 && Math.abs(data[off+2]-target[2])<10){
                data[off]=fill[0]; data[off+1]=fill[1]; data[off+2]=fill[2]; data[off+3]=255;
                if(cx>0) stack.push([cx-1, cy]); if(cx<599) stack.push([cx+1, cy]);
                if(cy>0) stack.push([cx, cy-1]); if(cy<599) stack.push([cx, cy+1]);
            }
        }
        ctx.putImageData(imgData, 0, 0); saveHistory();
    }
    function hexToRgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

    // --- コア機能 ---
    function save() {
        const name = document.getElementById('inpName').value; if(!name) return;
        const fields = Array.from(document.querySelectorAll('.f-row')).map(r => ({l:r.querySelector('.f-l').value, v:r.querySelector('.f-v').value}));
        const data = { 
            name, fields, desc: document.getElementById('inpDesc').value, mythos: document.getElementById('inpMythos').value,
            imgs: [ {img:document.getElementById('dataImg0').value, desc:document.getElementById('dataDesc0').value}, 
                    {img:document.getElementById('dataImg1').value, desc:document.getElementById('dataDesc1').value} ]
        };
        const idx = parseInt(document.getElementById('editIdx').value);
        if(idx===-1) chars.push(data); else chars[idx]=data;
        localStorage.setItem('zukan_v14_data', JSON.stringify(chars)); renderList(); initNew(); alert("アーカイブ完了");
    }

    function exportData() {
        const code = btoa(encodeURIComponent(JSON.stringify({title:archiveTitle, chars, deco})));
        const area = document.getElementById('shareCode'); area.value = code;
        area.select(); document.execCommand('copy'); alert("コードをコピーしました！");
    }

    function importData() {
        try {
            const d = JSON.parse(decodeURIComponent(atob(document.getElementById('shareCode').value.trim())));
            if(confirm("読込しますか？")){ chars=d.chars; archiveTitle=d.title; deco=d.deco; 
            localStorage.setItem('zukan_v14_data', JSON.stringify(chars)); location.reload(); }
        } catch(e){ alert("コードが無効です"); }
    }

    function renderList() {
        document.getElementById('charList').innerHTML = chars.map((c,i)=>`<div class="char-entry" onclick="edit(${i})"><span>${c.name}</span><button style="background:none; border:none; color:red; font-weight:bold;" onclick="event.stopPropagation(); deleteChar(${i})">✕</button></div>`).join('');
    }
    function deleteChar(i){ if(confirm("消去？")){ chars.splice(i,1); localStorage.setItem('zukan_v14_data', JSON.stringify(chars)); renderList(); } }
    function edit(i) {
        const c=chars[i]; document.getElementById('editIdx').value=i; document.getElementById('inpName').value=c.name;
        document.getElementById('inpDesc').value=c.desc; document.getElementById('inpMythos').value=c.mythos;
        document.getElementById('fieldContainer').innerHTML=''; (c.fields||[]).forEach(f=>newField(f.l, f.v));
        c.imgs.forEach((m,s)=>{ 
            document.getElementById('dataImg'+s).value=m.img; document.getElementById('prev'+s).src=m.img;
            document.getElementById('prev'+s).style.display=m.img?'block':'none';
            document.getElementById('slotLabel'+s).style.display=m.img?'none':'block';
            document.getElementById('dataDesc'+s).value=m.desc;
        });
    }
    function initNew() {
        document.getElementById('editIdx').value="-1"; document.getElementById('inpName').value=""; document.getElementById('inpDesc').value=""; document.getElementById('inpMythos').value="";
        document.getElementById('fieldContainer').innerHTML=''; newField();
        [0,1].forEach(s=>{ document.getElementById('dataImg'+s).value=""; document.getElementById('prev'+s).style.display='none'; document.getElementById('slotLabel'+s).style.display='block'; document.getElementById('dataDesc'+s).value=""; });
    }
    function newField(l='', v=''){
        const d=document.createElement('div'); d.className='f-row'; d.style="display:flex; gap:5px; margin-bottom:5px;";
        d.innerHTML=`<input type="text" class="f-l" value="${l}" placeholder="項目" style="flex:1; margin:0;"><input type="text" class="f-v" value="${v}" placeholder="内容" style="flex:2; margin:0;">`;
        document.getElementById('fieldContainer').appendChild(d);
    }
    function saveDeco(){ deco={bg:document.getElementById('decoBg').value, text:document.getElementById('decoText').value, emblem:document.getElementById('decoEmblem').value}; localStorage.setItem('zukan_v14_deco', JSON.stringify(deco)); }
    function setMode(m){ document.getElementById('sectionEdit').style.display=m==='edit'?'flex':'none'; document.getElementById('sectionBook').style.display=m==='book'?'flex':'none'; if(m==='book') buildBook(); }
    function buildBook(){
        const w=document.getElementById('bookWrapper');
        let h=`<div class="page-node active" id="p-0" style="background:${deco.bg}; color:${deco.text}; text-align:center; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <div style="font-size:6rem;">${deco.emblem}</div><h1 style="font-size:1.5rem;">${archiveTitle}</h1>
        </div>`;
        chars.forEach((c,i)=>{
            h+=`<div class="page-node" id="p-${i+1}">
                <h2 style="text-align:center; border-bottom:2px solid var(--gold); font-size:1.2rem; margin:0 0 10px 0;">${c.name}</h2>
                <div style="display:flex; gap:5px; margin-bottom:10px;">${c.imgs.map(m=>m.img?`<div style="flex:1; text-align:center;"><img src="${m.img}" style="width:100%; border:1px solid #333;"><p style="font-size:0.6rem; margin:2px 0;">${m.desc}</p></div>`:'').join('')}</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:3px; margin-bottom:10px; font-size:0.75rem;">${(c.fields||[]).map(f=>`<div><b>${f.l}</b>:${f.v}</div>`).join('')}</div>
                <div style="background:rgba(0,0,0,0.05); padding:10px; border-radius:5px; font-size:0.85rem; margin-bottom:10px;">${c.desc||''}</div>
                ${c.mythos ? `<button onclick="alert('${c.mythos.replace(/\n/g,'\\n')}')" class="btn-action" style="margin:0; background:var(--gold); color:black;">📜 英雄譚を読む</button>` : ''}
            </div>`;
        });
        w.innerHTML=h; currentPageIdx=0;
    }
    function nextPage(){ if(currentPageIdx<chars.length){ document.getElementById(`p-${currentPageIdx}`).classList.remove('active'); currentPageIdx++; document.getElementById(`p-${currentPageIdx}`).classList.add('active'); } }
    function prevPage(){ if(currentPageIdx>0){ document.getElementById(`p-${currentPageIdx}`).classList.remove('active'); currentPageIdx--; document.getElementById(`p-${currentPageIdx}`).classList.add('active'); } }
    function changeTitlePrompt(){ const t=prompt("題名:", archiveTitle); if(t){ archiveTitle=t; localStorage.setItem('zukan_v14_title', t); document.getElementById('archiveTitleDisplay').innerText=t; } }
    function openPaintModal(s){ activeSlot=s; document.getElementById('paintModal').style.display='flex'; history=[]; initCanvas(); }
    function closePaintModal(){ document.getElementById('paintModal').style.display='none'; }
    function clearCanvas(){ ctx.fillStyle="white"; ctx.fillRect(0,0,600,600); saveHistory(); }
    function saveCanvas(){ document.getElementById('dataImg'+activeSlot).value=canvas.toDataURL(); edit(parseInt(document.getElementById('editIdx').value)); closePaintModal(); }

    window.onload=()=>{
        document.getElementById('archiveTitleDisplay').innerText=archiveTitle;
        document.getElementById('decoBg').value=deco.bg; document.getElementById('decoText').value=deco.text; document.getElementById('decoEmblem').value=deco.emblem;
        renderList(); initNew();
    };
</script>
</body>
</html>
